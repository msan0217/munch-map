name: Refresh Restaurant Data

on:
  schedule:
    # Run at 6am UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch Google top-rated restaurants
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/fetch-google-top-rated.mjs

      - name: Fetch Michelin restaurants
        run: node scripts/fetch-michelin.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/google-top-rated.json src/data/michelin.json
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit"
          else
            git commit -m "chore: refresh restaurant data [skip ci]"
            git push
          fi
